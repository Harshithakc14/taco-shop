<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <mata name="author" content="Harshitha k c">
        <meta name="description" content="Contact information for the Little Tacos Shop ">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Contact Us - LTS</title>
        <link rel="stylesheet" href="style.css">
                <script src="js/main.js" defer></script>

</head>

<body>
    <header class="header">
        <h1 class="header__1">Little Tacos Shop </h1>
        <nav class="header__nav">
            <ul class="header__ul">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#menu"> Menu</a></li>
                <li><a href="hours.html">Store Hours</a></li>
                <li><a href="about.html">About</a></li>
            </ul>

        </nav>
    </header>
    <section>
        <figure>
            <img src="images/image3.png" alt="Little Tacos Shop Tacos " title="Tacos ready to eat" width="1000px"
                height="667px">
            <figcaption class="offscreen">Little Tacos Shop Tacos</figcaption>
        </figure>
    </section>

    <main class="main">
         <article class="main__article">
            <h2>Our Location</h2>
            <address>
                555 Taco Temptation Lane,suite T<br>
                kansas City
                <br>
                Phone: <a href="tel:+55555555555">555-555-5555</a>
            </address>
        </article>
        <hr>


        <article class="main__article contact">
            <h2 class="contact__h2">Our Contact Form</h2>
            <form action="https://httpbin.org/get" method="get" class="contact__form">
                <fieldset class="contact__fieldset">
                    <legend class="offscreen">Send Us A Message</legend>
                    <p class="contact__p">
                        <label class="contact__label" for="name">Name:</label>
                        <input class="contact__input" type="text" name="name" id="name" placeholder="your name" required>
                    </p>
                    <p class="contact__p">
                        <label class="contact__label" for="email">Email:</label>
                        <input class="contact__input" type="email" name="email" id="email" placeholder="your email" required>
                    </p>
                    <p class="contact__p">
                        <label class="contact__label" for="message">Your Message:</label>
                        <br>
                        <textarea  class="contact__textarea" name="message" id="message" cols="30" rows="10"
                            placeholder="Type your message here"></textarea>
                    </p>
                </fieldset>
                <button class="contact__button" type="submit">Send </button>
                <button class="contact__button" type="reset">Reset </button>
            </form>
            <label for="email">Email:</label>
        </article>
       

    </main>
    <footer class="footer">
        <p>
            <span class="nowrap"> Copyright &copy;<time id="year"></time></span>
            <span class="nowrap">The Little Taco Shop</span>
        </p>
    </footer>

</body>

</html>
