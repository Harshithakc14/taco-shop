    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - LTS</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <header class="header">
        <h1 class="header__h1">Contact Us </h1>
        <nav class="header__nav">
            <ul class="header__ul">
            <li><a href="/">Home</a></li>
            <li><a href="/#menu"> Menu</a></li>
            <li><a href="hours.html">Store Hours</a></li>
            <li><a href="about.html">About</a></li>
           </ul>
           
        </nav>
    </header>
    <section>
         <figure>
            <img src="images/image3.png" alt="Little Tacos Shop Tacos " title="Tacos ready to eat" width="1000px" height="667px">
            <figcaption class="offscreen">Little Tacos Shop Tacos</figcaption>
        </figure>
    </section>

    <main>
        <section>
     <h2>Our Contact Form</h2>
     <form action="https://httpbin.org/get" method="get">
        <fieldset>
            <legend>Send Us A Message</legend>
            <p>
                <label for="name">Name:</label>
                <input type="text" name="name" id="name" placeholder="your name" required>
            </p>
             <p>
                <label for="email">Email:</label>
                <input type="email" name="email" id="email" placeholder="your email" required>
            </p>
            <p>
                <label for="message">Your Message:</label>
                <br>
                <textarea name="message" id="message" cols="30" rows="10"placeholder="Type your message here"></textarea>
            </p>
        </fieldset>
        <button type="submit">Send </button>
        <button type="reset">Reset </button>
     </form>
     </section>
     <section>
        <h2>Our Location</h2>
        <address>
            555 Taco Temptation Lane,suite T<br>
            kansas City
            <br>
            Phone: <a href="tel:+55555555555">555-555-5555</a>
        </address>
     </section>
     

    </main>
    <hr>
    <footer>
    <p>Copyright &copy; The Little Taco Shop</p>
    </footer>
   
</body>
